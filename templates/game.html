<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Tic Tac Toe</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 20px;
        }

        .cell {
            background: #2d2d44;
            height: 100px;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .info {
            margin-top: 15px;
        }

        .scoreboard {
            margin-top: 10px;
            font-size: 14px;
        }
        @keyframes pop {
            from { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .cell {
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .cell:hover {
            transform: scale(1.05);
            background: #3a3a5c;
        }
        /* TOP SECTION */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .room-box {
            font-size: 12px;
            opacity: 0.7;
        }

        .room-code {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #00d4ff;
            text-shadow: 0 0 8px #00d4ff;
        }

        .you-box {
            font-size: 12px;
            opacity: 0.7;
        }

        .symbol-badge {
            display: inline-block;
            font-size: 18px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            background: #4CAF50;
            margin-left: 5px;
        }

        /* TURN BOX */
        .turn-box {
            margin: 10px 0 15px 0;
            font-size: 18px;
            font-weight: bold;
            padding: 8px;
            border-radius: 6px;
            background: #2d2d44;
        }

        /* MODERN SCOREBOARD */
        .scoreboard-modern {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .score-card {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: #2d2d44;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .score-card:hover {
            transform: scale(1.05);
            background: #3a3a5c;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HOME SCREEN -->
    <div id="home">
        <h1>Tic Tac Toe</h1>
        <input type="text" id="username" placeholder="Enter your name" />
        <br>
        <button onclick="createRoom()">Create Room</button>
        <br>
        <input type="text" id="roomCode" placeholder="Enter room code" />
        <button onclick="joinRoom()">Join Room</button>
        <p id="error" style="color:red;"></p>
    </div>

    <!-- WAITING SCREEN -->
    <div id="waiting" class="hidden">
        <h2>Room Code: <span id="displayRoom"></span></h2>
        <p>Waiting for another player...</p>
    </div>

    <!-- GAME SCREEN -->
    <div id="game" class="hidden">

        <div class="top-bar">
            <div class="room-box">
                ROOM
                <div id="roomTitle" class="room-code"></div>
            </div>

            <div class="you-box">
                You are
                <span id="symbol" class="symbol-badge"></span>
            </div>
        </div>

        <div class="turn-box">
            <span id="turn"></span>
        </div>

        <div class="scoreboard-modern">
            <div class="score-card" id="scoreXCard"></div>
            <div class="score-card" id="scoreOCard"></div>
        </div>

        <div class="board" id="board"></div>

        <button onclick="restartGame()">Restart</button>
    </div>

</div>

<script>
    const socket = io();

    let currentRoom = null;
    let mySymbol = null;
    let playerNames = { X: "Player X", O: "Player O" };

    const boardDiv = document.getElementById("board");
    const turnDisplay = document.getElementById("turn");

    // Create board
    for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;
        cell.onclick = () => makeMove(i);
        boardDiv.appendChild(cell);
    }

    function showScreen(id) {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("waiting").classList.add("hidden");
        document.getElementById("game").classList.add("hidden");
        document.getElementById(id).classList.remove("hidden");
    }

    function createRoom() {
        const username = document.getElementById("username").value.trim();
        if (!username) return;
        socket.emit("create_room", { username });
    }

    function joinRoom() {
        const username = document.getElementById("username").value.trim();
        const room = document.getElementById("roomCode").value.trim();
        if (!username || !room) return;
        socket.emit("join_room", { username, room });
    }

    function makeMove(index) {
        if (!currentRoom) return;
        socket.emit("make_move", { room: currentRoom, index });
    }

    function restartGame() {
        socket.emit("restart_game", { room: currentRoom });
        removeWinnerBanner();
        boardDiv.style.pointerEvents = "auto";
    }

    function showWinnerBanner(text, isDraw = false) {
        removeWinnerBanner();

        const banner = document.createElement("div");
        banner.id = "winnerBanner";
        banner.innerHTML = `
            <div style="
                position:fixed;
                top:50%;
                left:50%;
                transform:translate(-50%, -50%);
                background:#2ecc71;
                padding:30px;
                border-radius:10px;
                text-align:center;
                animation:pop 0.4s ease;
                z-index:999;
            ">
                <h2>${text}</h2>
                ${!isDraw ? `<img src="https://share.google/c74ujHvhThybn3lG5" width="120"/>` : ""}
            </div>
        `;
        document.body.appendChild(banner);
    }

    function removeWinnerBanner() {
        const banner = document.getElementById("winnerBanner");
        if (banner) banner.remove();
    }

    socket.on("room_created", data => {
        currentRoom = data.room;
        mySymbol = data.symbol;

        document.getElementById("displayRoom").innerText = currentRoom;
        showScreen("waiting");
    });

    socket.on("joined_room", data => {
        currentRoom = data.room;
        mySymbol = data.symbol;

        document.getElementById("displayRoom").innerText = currentRoom;
        showScreen("waiting");
    });

    socket.on("start_game", () => {
        showScreen("game");

        document.getElementById("roomTitle").innerText = "Room: " + currentRoom;
        document.getElementById("symbol").innerText = mySymbol;
    });

    socket.on("update_board", data => {
        const cells = document.querySelectorAll(".cell");

        // Update board
        data.board.forEach((value, index) => {
            cells[index].innerText = value;
        });

        playerNames = data.players || {};

        const nameX = playerNames.X || "Player X";
        const nameO = playerNames.O || "Player O";

        // 🔥 Update score line properly
        document.getElementById("scoreXCard").innerHTML =
            nameX + " (X)<br><span style='font-size:20px'>" + data.scores.X + "</span>";

        document.getElementById("scoreOCard").innerHTML =
            nameO + " (O)<br><span style='font-size:20px'>" + data.scores.O + "</span>";

        // 🔥 Update turn properly
        if (data.winner) {
            turnDisplay.innerText = "Game Over";
        } else if (data.draw) {
            turnDisplay.innerText = "Draw Game";
        } else if (data.turn && playerNames[data.turn]) {
            turnDisplay.innerText = playerNames[data.turn] + "'s Turn";
        }

        // 🔥 Disable board if game finished
        if (data.winner || data.draw) {
            boardDiv.style.pointerEvents = "none";
        } else {
            boardDiv.style.pointerEvents = "auto";
        }

        // 🔥 Show winner UI
        if (data.winner) {
            const winnerName = playerNames[data.winner];
            showWinnerBanner(winnerName + " Wins 🎉");
        } else if (data.draw) {
            showWinnerBanner("It's a Draw 🤝", true);
        }
    });

    socket.on("error_message", message => {
        document.getElementById("error").innerText = message;
    });

</script>

</body>
</html>
